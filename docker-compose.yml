services:
  mic741-postgres:
    image: postgres:16-alpine
    container_name: bsp-agent-mic741-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bsp_agent
      POSTGRES_USER: bsp_agent
      POSTGRES_PASSWORD: ${MIC741_POSTGRES_PASSWORD:-bsp_agent}
    ports:
      - "55433:5432"
    volumes:
      - mic741_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bsp_agent -d bsp_agent"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mic741_postgres_data:
